name: Build w/ kernal 6.21 for Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Register QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Checkout Armbian Build System
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build-system

      - name: Checkout Patches (This Repo)
        uses: actions/checkout@v4
        with:
          path: build-system/userpatches

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      - name: Build Armbian Image
        run: |
          cd build-system
          # Use BRANCH=edge to tell the system we want the absolute latest
          # We also add the 'EXTRA_CONFIG' to force the WiFi 7 driver to compile
          ./compile.sh BOARD=orangepi-4pro BRANCH=edge RELEASE=bookworm \
          BUILD_MINIMAL=yes KERNEL_CONFIGURE=no KERNEL_MAJOR_MINOR=6.22 \
          SKIP_EXTERNAL_DRIVERS=yes DOCKER_PRIVILEGED=yes \
          EXTRA_CONFIG="CONFIG_MT7925U=m CONFIG_MT792x_LIB=m"
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orangepi-4pro-WiFi7-Image-v6.22
          path: build-system/output/images/*.img*
