name: Build for Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Armbian Build System
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build-system

      - name: Checkout Gibson Patches (This Repo)
        uses: actions/checkout@v4
        with:
          path: build-system/userpatches

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      - name: Build Armbian Image
        run: |
          cd build-system
          # We pass KERNEL_MAJOR_MINOR=6.19 to ensure the MT7925 drivers are included
          ./compile.sh BOARD=orangepi-4pro BRANCH=mainline RELEASE=bookworm \
          BUILD_MINIMAL=yes KERNEL_CONFIGURE=no KERNEL_MAJOR_MINOR=6.19 \
          SKIP_EXTERNAL_DRIVERS=yes

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gibson-WiFi7-Image
          path: build-system/output/images/*.img*
