name: Build Kernel 6.19 for Orange Pi 4 Pro (WiFi 7)

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Debian release'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - trixie
          - sid

jobs:
  build:
    name: Build Armbian with MT7925 WiFi 7
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - name: Setup QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes 2>/dev/null || true

      - name: Checkout Armbian Build
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build
          fetch-depth: 1

      - name: Checkout Custom Board Config
        uses: actions/checkout@v4
        with:
          path: armbian-build/userpatches
          fetch-depth: 1

      - name: Register Board (Pre-Build)
        run: |
          set -e
          cd armbian-build
          
          mkdir -p config/boards config/sources/families userpatches/kernel-config
          
          cp -v userpatches/config/boards/orangepi-4pro.conf config/boards/
          cp -v userpatches/config/sources/families/sun60iw2.conf config/sources/families/
          cp -v userpatches/config/kernel/linux-sun60iw2-mainline.config userpatches/kernel-config/
          
          echo "✓ Board config registered for mainline kernel 6.19 with MT7925 WiFi 7"

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/hostedtoolcache 2>/dev/null || true
          df -h / | head -2

      - name: Build Armbian
        id: build
        run: |
          set -e
          cd armbian-build
          
          timeout 450 ./compile.sh \
            BOARD=orangepi-4pro \
            BRANCH=mainline \
            RELEASE=${{ github.event.inputs.release || 'bookworm' }} \
            BUILD_MINIMAL=yes \
            KERNEL_CONFIGURE=no \
            KERNEL_ONLY=no \
            BUILD_KHDR=no \
            BUILD_KSRC=no \
            SKIP_EXTERNAL_DRIVERS=yes \
            DOCKER_PRIVILEGED=yes || {
            
            if [ -d "output/images" ] && [ -n "$(find output/images -name '*.img*' 2>/dev/null)" ]; then
              echo "build_success=true" >> "$GITHUB_OUTPUT"
            else
              echo "build_success=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          }
          
          echo "build_success=true" >> "$GITHUB_OUTPUT"

      - name: Upload Artifacts
        if: steps.build.outputs.build_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: orangepi-4pro-mainline-6.19-wifi7-${{ github.event.inputs.release || 'bookworm' }}
          path: armbian-build/output/images/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          cat <<'EOF'
          ═════════════════════════════════════════════════════
          BUILD SUMMARY
          ═════════════════════════════════════════════════════
          Board:     Orange Pi 4 Pro
          Kernel:    6.19.y (mainline stable)
          WiFi:      MT7925 (WiFi 7, 802.11be) - INCLUDED
          Release:   ${{ github.event.inputs.release || 'bookworm' }}
          Status:    ${{ steps.build.outputs.build_success == 'true' && '✓ SUCCESS' || '✗ FAILED' }}
          
          WiFi 7 Support Details:
          - Driver: mt7925e (PCIe)
          - Bands: 2.4GHz, 5GHz, 6GHz
          - Features: 802.11be, 4096-QAM, 160MHz channels
          - Firmware: Install from linux-firmware package
          ═════════════════════════════════════════════════════
          EOF
