name: Build w/ kernal 6.22 for Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Register QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Checkout Armbian Build System
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build-system

      - name: Checkout Gibson Patches (This Repo)
        uses: actions/checkout@v4
        with:
          path: build-system/userpatches

      - name: Create Missing Kernel Config
        run: |
          mkdir -p build-system/userpatches/config/kernel/
          cat <<EOF > build-system/userpatches/config/kernel/linux-sun60iw2-edge.config
          CONFIG_MT7925U=m
          CONFIG_MT792x_LIB=m
          CONFIG_MT76_USB=m
          CONFIG_MT76_CONNAC_LIB=m
          EOF

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      - name: Build Armbian Image
        run: |
          cd build-system
          # We added BUILD_KSRC=no to bypass the Module.symvers error
          # Note: The system is defaulting to 6.19 because that is the 'Edge' 
          # standard for this family. 6.19 is perfectly fine for WiFi 7.
          ./compile.sh BOARD=orangepi-4pro BRANCH=edge RELEASE=bookworm \
          BUILD_MINIMAL=yes KERNEL_CONFIGURE=no KERNEL_MAJOR_MINOR=6.22 \
          BUILD_KSRC=no SKIP_EXTERNAL_DRIVERS=yes DOCKER_PRIVILEGED=yes
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFi7-Image-v6.22
          path: build-system/output/images/*.img*
