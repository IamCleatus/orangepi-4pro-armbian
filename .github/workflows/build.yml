name: Build w/ kernel 6.19 for Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Register QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Checkout Armbian Build System
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build-system

      - name: Checkout Gibson Patches (This Repo)
        uses: actions/checkout@v4
        with:
          path: build-system/userpatches

      # Fixes the Module.symvers find error that can block the final step
      - name: Hot-Patch Packaging Engine
        run: |
          TARGET_FILE="build-system/lib/functions/compilation/kernel-debs.sh"
          if [ -f "$TARGET_FILE" ]; then
            sed -i 's/find Module.symvers/find Module.symvers 2>\/dev\/null || find/g' "$TARGET_FILE"
          fi

      # Inherits a full board configuration baseline and injects Wi-Fi 7 + RAMdisk layers
      - name: Synthesize Complete Kernel Config
        run: |
          mkdir -p build-system/userpatches/config/kernel
          mkdir -p build-system/config/kernel
          
          # Search for ANY existing sun60iw2 config template in the workspace
          FOUND_CONFIG=$(find build-system/config/kernel/ build-system/userpatches/config/kernel/ -name "linux-sun60iw2-*.config" 2>/dev/null | head -n 1)
          
          if [ -n "$FOUND_CONFIG" ]; then
            echo "Found base template at $FOUND_CONFIG. Cloning structure..."
            cp "$FOUND_CONFIG" build-system/config/kernel/linux-sun60iw2-edge.config
          else
            echo "No local template found! Pulling standard upstream sun60iw2 baseline..."
            curl -sL "https://raw.githubusercontent.com/armbian/build/main/config/kernel/linux-sun60iw2-current.config" -o build-system/config/kernel/linux-sun60iw2-edge.config
          fi
          
          # Force append core RAMdisk targets and your Wi-Fi 7 driver variables
          cat <<EOF >> build-system/config/kernel/linux-sun60iw2-edge.config
          CONFIG_BLK_DEV_INITRD=y
          CONFIG_RD_GZIP=y
          CONFIG_MT7925U=m
          CONFIG_MT792x_LIB=m
          CONFIG_MT76_USB=m
          CONFIG_MT76_CONNAC_LIB=m
          CONFIG_BT_MTK=m
          CONFIG_BT_HCIBTUSB=m
          CONFIG_BT_HCIBTUSB_MTK=y
          EOF
          
          # Sync to userpatches to satisfy the build system integrity check
          cp build-system/config/kernel/linux-sun60iw2-edge.config build-system/userpatches/config/kernel/linux-sun60iw2-edge.config
          echo "Configuration compilation complete."

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      - name: Build Armbian Image
        run: |
          cd build-system
          ./compile.sh BOARD=orangepi-4pro BRANCH=edge RELEASE=bookworm \
          BUILD_MINIMAL=yes KERNEL_CONFIGURE=no KERNEL_MAJOR_MINOR=6.19 \
          BUILD_KHDR=no BUILD_KSRC=no \
          DOCKER_PRIVILEGED=yes
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orangepi-4pro-6.19-Image
          path: build-system/output/images/*.img*
