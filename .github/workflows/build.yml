name: Build Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Register QEMU binfmts (The "Translator")
      # This allows the x86 factory to run the ARM Gibson code
      - name: Register QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      # 2. Pull the Armbian Build Engine
      - name: Checkout Armbian Build System
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build-system

      # 3. Pull your Gibson Patches into the 'userpatches' folder
      - name: Checkout Patches (This Repo)
        uses: actions/checkout@v4
        with:
          path: build-system/userpatches

      # 4. Wipe the runner's bloat to make 30GB+ of room
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      # 5. Build the 6.19 Mainline Image
      - name: Build Armbian Image
        run: |
          cd build-system
          # Using KERNEL_MAJOR_MINOR=6.19 ensures the A9000 is plug-and-play
          ./compile.sh BOARD=orangepi-4pro BRANCH=mainline RELEASE=bookworm \
          BUILD_MINIMAL=yes KERNEL_CONFIGURE=no KERNEL_MAJOR_MINOR=6.19 \
          SKIP_EXTERNAL_DRIVERS=yes DOCKER_PRIVILEGED=yes

      # 6. Save the finished image for download
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gibson-WiFi7-Image
          path: build-system/output/images/*.img*
