name: Build w/ kernel 6.19 for Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Initialize cross-architecture translation layers
      - name: Register QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      # 2. Retrieve the official Armbian compilation framework
      - name: Checkout Armbian Build System
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build-system

      # 3. Inject your custom board configuration layer
      - name: Checkout Gibson Patches (This Repo)
        uses: actions/checkout@v4
        with:
          path: build-system/userpatches

      # 4. HOT-PATCH: Deactivate initramfs compilation and packaging lookup blocks
      - name: Hot-Patch Core Compilation Engine
        run: |
          # Clear Module.symvers lookup faults during packaging
          DEBS_FILE="build-system/lib/functions/compilation/kernel-debs.sh"
          if [ -f "$DEBS_FILE" ]; then
            sed -i 's/find Module.symvers/find Module.symvers 2>\/dev\/null || find/g' "$DEBS_FILE"
          fi
          
          # Force update-initramfs commands to bypass compression loops cleanly
          INITRD_FILE="build-system/lib/functions/image/initrd.sh"
          if [ -f "$INITRD_FILE" ]; then
            echo "Intercepting initramfs compilation routine to clear compression crashes..."
            sed -i 's/update-initramfs/echo "Bypassing initramfs creation..."/g' "$INITRD_FILE"
          fi
          echo "Framework hot-patches applied successfully."

      # 5. BLANKET INJECTION: Force wireless drivers across all config profiles simultaneously
      - name: Blanket Driver Template Configuration
        run: |
          echo "Injecting MediaTek WiFi 7 drivers across all sun60iw2 target profiles..."
          find build-system/ -name "linux-sun60iw2-*.config" -type f | while read -r config_file; do
            cat <<EOF >> "$config_file"
          CONFIG_MT7925U=m
          CONFIG_MT792x_LIB=m
          CONFIG_MT76_USB=m
          CONFIG_MT76_CONNAC_LIB=m
          CONFIG_BT_MTK=m
          CONFIG_BT_HCIBTUSB=m
          CONFIG_BT_HCIBTUSB_MTK=y
          EOF
          done

      # 6. Reclaim runtime disk storage space inside the hosted server safely
      - name: Safe Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android
          df -h /

      # 7. Execute the compilation engine targeting the mainline branch structure
      - name: Build Armbian Image
        run: |
          cd build-system
          ./compile.sh BOARD=orangepi-4pro BRANCH=mainline RELEASE=bookworm \
          BUILD_MINIMAL=yes KERNEL_CONFIGURE=no KERNEL_MAJOR_MINOR=6.19 \
          BUILD_KHDR=no BUILD_KSRC=no \
          SKIP_EXTERNAL_DRIVERS=yes DOCKER_PRIVILEGED=yes

      # 8. Collect and export the flashable operating system image asset
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: orangepi-4pro-6.19-Image
          path: build-system/output/images/*.img*
