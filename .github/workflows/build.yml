name: Build for Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      - name: Checkout Gibson Patches
        uses: actions/checkout@v4
        with:
          path: userpatches

      - name: Build Armbian Image
        uses: armbian/build@main
        with:
          armbian_token: ${{ secrets.GITHUB_TOKEN }}
          armbian_board: "orangepi-4pro"
          armbian_kernel_branch: "branch:linux-6.19.y"
          armbian_branch: "main"
          armbian_release: "bookworm"
          armbian_target: "build"
          armbian_ui: "minimal"
          # This flag tells the engine to look in your repo for the BOARD file
          armbian_extensions: "userpatches"
