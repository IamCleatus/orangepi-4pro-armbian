name: Build Kernel 6.19 for Orange Pi 4 Pro (Mainline)

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Debian release'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - trixie
          - sid
      build_debug:
        description: 'Enable debug logging'
        required: false
        default: false
        type: boolean

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Custom Patches
        uses: actions/checkout@v4
        with:
          path: patches-repo

      - name: Validate Board Configuration
        run: |
          set -e
          echo "Validating Orange Pi 4 Pro board configuration..."
          
          [ -f "patches-repo/config/boards/orangepi-4pro.conf" ] || {
            echo "ERROR: Board config not found"
            exit 1
          }
          
          source patches-repo/config/boards/orangepi-4pro.conf
          
          [ -n "$BOARDFAMILY" ] || { echo "ERROR: BOARDFAMILY not set"; exit 1; }
          [ -n "$KERNELSOURCE" ] || { echo "ERROR: KERNELSOURCE not set"; exit 1; }
          [ -n "$KERNELBRANCH" ] || { echo "ERROR: KERNELBRANCH not set"; exit 1; }
          
          echo "✓ Board: $BOARDFAMILY"
          echo "✓ Kernel Branch: $KERNELBRANCH"
          echo "✓ Kernel Source: $KERNELSOURCE"

      - name: Validate Kernel Config
        run: |
          set -e
          CONFIG_FILE="patches-repo/config/kernel/linux-sun60iw2-mainline.config"
          
          [ -f "$CONFIG_FILE" ] || {
            echo "ERROR: Kernel config not found at $CONFIG_FILE"
            exit 1
          }
          
          LINES=$(wc -l < "$CONFIG_FILE")
          echo "✓ Kernel config valid ($LINES lines)"

  build:
    name: Build Armbian Image
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 480
    
    steps:
      - name: Setup QEMU for ARM64
        run: |
          echo "Setting up QEMU user-static for cross-architecture builds..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static binfmt-support 2>&1 | grep -v "^Setting up"
          
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes 2>/dev/null || true
          echo "✓ QEMU initialized"

      - name: Checkout Armbian Build Framework
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: armbian-build
          fetch-depth: 1
          clean: false

      - name: Checkout Custom Patches and Board Config
        uses: actions/checkout@v4
        with:
          path: armbian-build/userpatches
          fetch-depth: 1

      - name: Link Board Configuration Files
        run: |
          set -e
          USERPATCHES="armbian-build/userpatches"
          BUILD_SYSTEM="armbian-build"
          
          echo "Linking custom board configurations..."
          
          cp -v "$USERPATCHES/config/boards/orangepi-4pro.conf" \
                "$BUILD_SYSTEM/config/boards/" || {
            echo "ERROR: Failed to copy board config"
            exit 1
          }
          
          mkdir -p "$BUILD_SYSTEM/config/sources/families"
          cp -v "$USERPATCHES/config/sources/families/sun60iw2.conf" \
                "$BUILD_SYSTEM/config/sources/families/" || {
            echo "ERROR: Failed to copy family config"
            exit 1
          }
          
          mkdir -p "$BUILD_SYSTEM/userpatches/kernel-config"
          cp -v "$USERPATCHES/config/kernel/linux-sun60iw2-mainline.config" \
                "$BUILD_SYSTEM/userpatches/kernel-config/" || {
            echo "ERROR: Failed to copy kernel config"
            exit 1
          }
          
          echo "✓ Board configs linked successfully"

      - name: Prepare Kernel Patches
        run: |
          set -e
          USERPATCHES="armbian-build/userpatches"
          PATCH_DIR="$USERPATCHES/patches/kernel/sun60iw2-mainline"
          
          if [ -d "$PATCH_DIR" ] && [ "$(find $PATCH_DIR -name '*.patch' | wc -l)" -gt 0 ]; then
            echo "Found $(find $PATCH_DIR -name '*.patch' | wc -l) kernel patches"
            find "$PATCH_DIR" -name '*.patch' | sort | while read patch; do
              echo "  - $(basename $patch)"
            done
            echo "✓ Patches ready for application during build"
          else
            echo "ℹ No additional kernel patches found"
          fi

      - name: Reclaim Disk Space
        run: |
          echo "Freeing disk space..."
          sudo rm -rf /usr/local/lib/android 2>/dev/null || true
          sudo rm -rf /opt/hostedtoolcache 2>/dev/null || true
          df -h / | head -2

      - name: Compile Armbian Image
        id: build
        run: |
          set -e
          cd armbian-build
          
          BUILD_CMD="./compile.sh \
            BOARD=orangepi-4pro \
            BRANCH=mainline \
            RELEASE=${{ github.event.inputs.release || 'bookworm' }} \
            BUILD_MINIMAL=yes \
            KERNEL_CONFIGURE=no \
            KERNEL_ONLY=no \
            BUILD_KHDR=no \
            BUILD_KSRC=no \
            SKIP_EXTERNAL_DRIVERS=yes \
            DOCKER_PRIVILEGED=yes \
            ${{ github.event.inputs.build_debug == 'true' && 'DEBUG=yes' || '' }}"
          
          echo "Executing build..."
          if eval "$BUILD_CMD"; then
            echo "✓ Build completed successfully"
            echo "build_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Build failed"
            echo "build_success=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Verify Build Output
        if: steps.build.outputs.build_success == 'true'
        run: |
          set -e
          cd armbian-build
          
          OUTPUT_DIR="output/images"
          
          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "ERROR: Output directory not found"
            exit 1
          fi
          
          IMG_COUNT=$(find "$OUTPUT_DIR" -maxdepth 1 -name "*.img*" -type f 2>/dev/null | wc -l)
          
          if [ "$IMG_COUNT" -eq 0 ]; then
            echo "ERROR: No image files found in output/"
            ls -lah "$OUTPUT_DIR" || true
            exit 1
          fi
          
          echo "✓ Found $IMG_COUNT image file(s):"
          find "$OUTPUT_DIR" -maxdepth 1 -name "*.img*" -type f -exec ls -lh {} \;
          
          find "$OUTPUT_DIR" -maxdepth 1 -name "*.img" -type f | while read img; do
            SIZE=$(stat -f%z "$img" 2>/dev/null || stat -c%s "$img" 2>/dev/null)
            if [ "$SIZE" -lt 100000000 ]; then
              echo "ERROR: Image $img suspiciously small: $SIZE bytes"
              exit 1
            fi
            echo "✓ Image valid: $(basename $img) ($((SIZE / 1024 / 1024))MB)"
          done

      - name: Upload Build Artifacts
        if: steps.build.outputs.build_success == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: orangepi-4pro-mainline-${{ github.event.inputs.release || 'bookworm' }}-kernel-6.19
          path: armbian-build/output/images/
          retention-days: 30
          compression-level: 6
          if-no-files-found: error

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            armbian-build/output/logs/
            armbian-build/.build-*.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Build Summary
        if: always()
        run: |
          cat <<EOF
          
          ═══════════════════════════════════════════════════════════════════
          BUILD SUMMARY
          ═══════════════════════════════════════════════════════════════════
          Board:       Orange Pi 4 Pro (sun60iw2)
          Kernel:      6.19.y (mainline stable)
          Release:     ${{ github.event.inputs.release || 'bookworm' }}
          Status:      ${{ steps.build.outputs.build_success == 'true' && '✓ SUCCESS' || '✗ FAILED' }}
          Artifacts:   armbian-build/output/images/
          ═══════════════════════════════════════════════════════════════════
          EOF
