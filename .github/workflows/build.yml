name: Build Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Suppresses the Node.js deprecation warnings appearing in your logs
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Board Patches (Userpatches)
        uses: actions/checkout@v4
        with:
          path: userpatches
          fetch-depth: 0

      - name: Build Armbian Image
        uses: armbian/build@main
        with:
          armbian_token: ${{ secrets.GITHUB_TOKEN }}
          armbian_board: "orangepi-4pro"
          armbian_kernel_branch: "mainline" # Matches Jonas's build.sh
          armbian_branch: "main"
          armbian_release: "bookworm"
          armbian_target: "build"
          armbian_ui: "minimal"
          armbian_runner_clean: "true" # Essential for 6.19 kernel disk space
