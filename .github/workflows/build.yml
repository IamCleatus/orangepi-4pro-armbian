name: Build Stable Gibson Gateway Baseline
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Register QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Checkout Armbian Build System
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build-system

      - name: Checkout Gibson Patches (This Repo)
        uses: actions/checkout@v4
        with:
          path: build-system/userpatches

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      - name: Build Armbian Image
        run: |
          cd build-system
          # Using BRANCH=vendor ensures all power management, U-Boot, and DTB maps compile cleanly
          ./compile.sh BOARD=orangepi-4pro BRANCH=vendor RELEASE=bookworm \
          BUILD_MINIMAL=yes KERNEL_CONFIGURE=no \
          BUILD_KHDR=no BUILD_KSRC=no \
          SKIP_EXTERNAL_DRIVERS=yes DOCKER_PRIVILEGED=yes
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gibson-Stable-Baseline
          path: build-system/output/images/*.img*
