name: Build w/ kernal 6.21 for Wi-Fi 7 Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Register QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Checkout Armbian Build System
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build-system

      - name: Checkout Patches (This Repo)
        uses: actions/checkout@v4
        with:
          path: build-system/userpatches

      - name: Create Missing Kernel Config
        run: |
          # Create the directory structure the build engine expects
          mkdir -p build-system/userpatches/config/kernel/
          
          # Create a minimal config for the sun60iw2 edge branch
          # This satisfies the sha256sum check and enables WiFi 7
          cat <<EOF > build-system/userpatches/config/kernel/linux-sun60iw2-edge.config
          CONFIG_MT7925U=m
          CONFIG_MT792x_LIB=m
          CONFIG_MT76_USB=m
          CONFIG_MT76_CONNAC_LIB=m
          EOF

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true

      - name: Build Armbian Image
        run: |
          cd build-system
          # Use BRANCH=edge to target Kernel 6.22
          ./compile.sh BOARD=orangepi-4pro BRANCH=edge RELEASE=bookworm \
          BUILD_MINIMAL=yes KERNEL_CONFIGURE=no KERNEL_MAJOR_MINOR=6.22 \
          SKIP_EXTERNAL_DRIVERS=yes DOCKER_PRIVILEGED=yes
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiFi7-Image-v6.22
          path: build-system/output/images/*.img*
